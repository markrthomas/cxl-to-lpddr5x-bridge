# CI: lint (Verilator) + directed simulation (Icarus) + coverage + cocotb + formal (SymbiYosys).
# Standard job layout (see ../DV_STANDARDS.md): regress (fast gate) → coverage / sva / random / cocotb / formal.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Pin OSS CAD Suite for reproducible formal CI; bump when upgrading tools.
  OSS_CAD_SUITE_VERSION: "2026-04-13"
  # Pinned Verible release for the advisory style-lint job (chipsalliance/verible).
  VERIBLE_VERSION: "v0.0-3946-g851d3ff4"

jobs:
  regress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog verilator

      - name: Lint (Verilator) + directed simulation + stress
        run: make regress && make stress

  coverage:
    needs: regress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Verilator coverage (cxl_lpddr5x_bridge)
        run: make coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-info
          path: sim/coverage.info
          if-no-files-found: ignore

  sva:
    needs: regress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Interface SVA (Verilator --assert, all 4 valid/ready ports)
        run: make sva

  random:
    needs: regress
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false                   # one bad seed shouldn't cancel the others
      matrix:
        seed: [1, 2, 3, 4]               # breadth across distinct random streams
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Randomized run, seed ${{ matrix.seed }} (Verilator --trace --assert; SVA live)
        run: make vlt-rand RAND_SEED=${{ matrix.seed }}

      - name: Upload waveform artifact
        if: always()                     # keep the VCD even when the SVA aborts the run
        uses: actions/upload-artifact@v4
        with:
          name: random-waves-seed${{ matrix.seed }}
          path: sim/obj_dir_rand/waves.vcd
          if-no-files-found: ignore

  cocotb:
    needs: regress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update && sudo apt-get install -y iverilog
          pip install cocotb==1.8.1

      - name: cocotb OSS UVM-equivalent tests (cxl_lpddr5x_bridge)
        run: make cocotb

  formal:
    needs: regress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: YosysHQ/setup-oss-cad-suite@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ env.OSS_CAD_SUITE_VERSION }}

      - name: SymbiYosys formal (bmc + cover + unbounded prove for all four modules incl. bridge top, depth 24)
        run: make formal

  # Advisory SystemVerilog style-lint + format check (Verible). Non-blocking:
  # the whole job is continue-on-error so style findings surface in the logs
  # without gating merges. Independent of `regress` so feedback lands fast.
  verible:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Install Verible ${{ env.VERIBLE_VERSION }}
        run: |
          set -euo pipefail
          url="https://github.com/chipsalliance/verible/releases/download/${VERIBLE_VERSION}/verible-${VERIBLE_VERSION}-linux-static-x86_64.tar.gz"
          echo "Fetching $url"
          curl -fsSL "$url" -o /tmp/verible.tar.gz
          mkdir -p /tmp/verible
          tar -xzf /tmp/verible.tar.gz -C /tmp/verible --strip-components=1
          echo "/tmp/verible/bin" >> "$GITHUB_PATH"

      - name: Verible style-lint (advisory; .rules.verible_lint)
        run: make verible-lint
